openapi: "3.0.0"
info:
  title: Simple Items API
  description: A simple API to create items
  version: "1.0.0"
  contact:
    name: API Support
    email: support@example.com

servers:
  - url: https://api.example.com/v2
    description: Production server

paths:
  /items:
    post:
      summary: Create a new item
      description: Creates a new item with the provided details
      operationId: createItem
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ItemRequest'
            example:
              name: "Sample Item"
              description: "This is a sample item"
      responses:
        '201':
          description: Item created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ItemResponse'
              example:
                id: "abc123"
                name: "Sample Item"
                description: "This is a sample item"
                createdAt: "2026-10-06T17:00:00Z"
        '400':
          description: Bad Request - Invalid input or missing required fields
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: "VALIDATION_ERROR"
                message: "Invalid request payload"
                details: "The 'name' field is required and cannot be empty"
        '500':
          description: Internal Server Error - Unexpected server-side failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: "INTERNAL_ERROR"
                message: "An unexpected error occurred"
                details: "Please try again later or contact support"

components:
  schemas:
    ItemRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
          description: Name of the item
          example: "Sample Item"
        description:
          type: string
          maxLength: 500
          description: Optional description of the item
          example: "This is a sample item"

    ItemResponse:
      type: object
      properties:
        id:
          type: string
          description: Unique identifier of the created item
          example: "abc123"
        name:
          type: string
          description: Name of the item
          example: "Sample Item"
        description:
          type: string
          description: Description of the item
          example: "This is a sample item"
        createdAt:
          type: string
          format: date-time
          description: Timestamp when the item was created
          example: "2026-10-06T17:00:00Z"

    ErrorResponse:
      type: object
      properties:
        code:
          type: string
          description: Machine-readable error code
          example: "VALIDATION_ERROR"
        message:
          type: string
          description: Human-readable error message
          example: "Invalid request payload"
        details:
          type: string
          description: Additional details about the error
          example: "The 'name' field is required and cannot be empty"