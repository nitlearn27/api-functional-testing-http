openapi: 3.0.0
info:
  title: Product API
  version: v1
  description: |
    The Product API provides RESTful endpoints to browse and manage the product catalog.
    It supports paginated listing with filtering, sorting, and full-text search, as well as
    strict field-level validation for product creation. All endpoints are secured via
    OAuth 2.0 or HTTP Basic Authentication.

servers:
  - url: https://products-api4-nlyxhy.5sc6y6-2.usa-e2.cloudhub.io/api
    description: Production server

security:
  - oauth_2_0:
      - products:read
  - basic_auth: []

components:
  securitySchemes:
    oauth_2_0:
      type: oauth2
      description: OAuth 2.0 Authorization Code and Client Credentials flows.
      flows:
        authorizationCode:
          authorizationUrl: https://auth.example.com/oauth/authorize
          tokenUrl: https://auth.example.com/oauth/token
          scopes:
            products:read: Read access to the product catalog.
            products:write: Write access to create products.
        clientCredentials:
          tokenUrl: https://auth.example.com/oauth/token
          scopes:
            products:read: Read access to the product catalog.
            products:write: Write access to create products.
    basic_auth:
      type: http
      scheme: basic
      description: HTTP Basic Authentication using username and password.

  schemas:
    ErrorDetail:
      type: object
      description: A single field-level validation failure.
      required:
        - field
        - message
      properties:
        field:
          type: string
          description: The name of the field that failed validation.
          example: price
        message:
          type: string
          description: Human-readable explanation of the validation failure.
          example: must be greater than or equal to 0.01
      additionalProperties: false

    ErrorResponse:
      type: object
      description: |
        Standardized error envelope for all 4xx and 5xx responses.
        The errors array is populated only for 422 responses.
      required:
        - timestamp
        - status
        - error
        - message
        - path
      properties:
        timestamp:
          type: string
          format: date-time
          description: RFC 3339 UTC timestamp when the error occurred.
          example: "2026-07-06T12:34:56.789Z"
        status:
          type: integer
          description: HTTP status code.
          example: 422
        error:
          type: string
          description: Short HTTP status reason phrase.
          example: Unprocessable Entity
        message:
          type: string
          description: Human-readable explanation of the error.
          example: Request body contains validation errors.
        path:
          type: string
          description: The request URI path that triggered the error.
          example: /products/v1/products
        errors:
          type: array
          description: Field-level validation errors. Non-empty only for 422 responses.
          items:
            $ref: '#/components/schemas/ErrorDetail'
      additionalProperties: false

    Product:
      type: object
      description: |
        A fully materialised product resource including server-generated fields
        (id and createdDate). Returned by GET /products, GET /products/{name},
        and POST /products (201).
      required:
        - id
        - name
        - sku
        - price
        - currency
        - category
        - stockQuantity
        - email
        - phoneNumber
        - createdDate
      properties:
        id:
          type: string
          description: Server-generated UUID v4 uniquely identifying the product.
          example: a1b2c3d4-e5f6-7890-abcd-ef1234567890
        name:
          type: string
          description: Human-readable display name of the product.
          minLength: 3
          maxLength: 100
          example: Wireless Bluetooth Headphones
        description:
          type: string
          description: Detailed marketing description of the product.
          maxLength: 500
          example: Premium over-ear noise-cancelling headphones with 30-hour battery life.
        sku:
          type: string
          description: Unique SKU — uppercase alphanumeric and dashes, 6–20 characters.
          pattern: '^[A-Z0-9\-]{6,20}$'
          example: WBH-XL900-BLK
        price:
          type: number
          format: float
          description: Retail selling price. Between 0.01 and 1,000,000.
          minimum: 0.01
          maximum: 1000000
          example: 149.99
        currency:
          type: string
          description: ISO 4217 currency code.
          enum: [USD, EUR, INR, GBP]
          example: USD
        category:
          type: string
          description: Product category.
          enum:
            - Electronics
            - Clothing
            - "Home & Garden"
            - "Sports & Outdoors"
            - Books
            - "Toys & Games"
            - "Health & Beauty"
            - Automotive
            - "Food & Beverages"
            - "Office Supplies"
          example: Electronics
        stockQuantity:
          type: integer
          description: Current available inventory count.
          minimum: 0
          example: 250
        email:
          type: string
          description: Supplier contact email (RFC 5322 format).
          pattern: '^[a-zA-Z0-9.!#$%&''*+/=?^_`{|}~-]+@[a-zA-Z0-9](?:[a-zA-Z0-9-]{0,61}[a-zA-Z0-9])?(?:\.[a-zA-Z0-9](?:[a-zA-Z0-9-]{0,61}[a-zA-Z0-9])?)*$'
          example: supplier@techcorp.com
        phoneNumber:
          type: string
          description: Supplier phone number in E.164 format.
          pattern: '^\+?[1-9]\d{7,14}$'
          example: "+14155552671"
        website:
          type: string
          description: Supplier website URL (http or https).
          pattern: '^https?://[a-zA-Z0-9]([a-zA-Z0-9\-]{0,61}[a-zA-Z0-9])?(\.[a-zA-Z0-9]([a-zA-Z0-9\-]{0,61}[a-zA-Z0-9])?)*(/[^\s]*)?$'
          example: https://www.techcorp.com
        isActive:
          type: boolean
          description: Whether the product is available for purchase.
          default: true
          example: true
        tags:
          type: array
          description: Searchable tags. Max 10 unique tags, each 1–20 characters.
          maxItems: 10
          uniqueItems: true
          items:
            type: string
            minLength: 1
            maxLength: 20
          example:
            - wireless
            - bluetooth
            - noise-cancelling
        createdDate:
          type: string
          format: date-time
          description: RFC 3339 UTC timestamp when the product was created (server-generated).
          example: "2026-07-06T10:00:00.000Z"
      additionalProperties: false

    ProductInput:
      type: object
      description: |
        Request body for creating a new product (POST /products).
        Excludes server-generated fields (id, createdDate).
        Additional properties are rejected.
      required:
        - name
        - sku
        - price
        - currency
        - category
        - stockQuantity
        - email
        - phoneNumber
      additionalProperties: false
      properties:
        name:
          type: string
          description: Display name. Between 3 and 100 characters.
          minLength: 3
          maxLength: 100
          example: Wireless Bluetooth Headphones
        description:
          type: string
          description: Detailed description. Maximum 500 characters.
          maxLength: 500
          example: Premium over-ear noise-cancelling headphones with 30-hour battery life.
        sku:
          type: string
          description: "Unique SKU. Must match: ^[A-Z0-9\\-]{6,20}$"
          pattern: '^[A-Z0-9\-]{6,20}$'
          example: WBH-XL900-BLK
        price:
          type: number
          format: float
          description: Retail price. Between 0.01 and 1,000,000.
          minimum: 0.01
          maximum: 1000000
          example: 149.99
        currency:
          type: string
          description: ISO 4217 currency code.
          enum: [USD, EUR, INR, GBP]
          example: USD
        category:
          type: string
          description: Product category.
          enum:
            - Electronics
            - Clothing
            - "Home & Garden"
            - "Sports & Outdoors"
            - Books
            - "Toys & Games"
            - "Health & Beauty"
            - Automotive
            - "Food & Beverages"
            - "Office Supplies"
          example: Electronics
        stockQuantity:
          type: integer
          description: Initial stock count. Must be 0 or greater.
          minimum: 0
          example: 250
        email:
          type: string
          description: Supplier email (RFC 5322).
          pattern: '^[a-zA-Z0-9.!#$%&''*+/=?^_`{|}~-]+@[a-zA-Z0-9](?:[a-zA-Z0-9-]{0,61}[a-zA-Z0-9])?(?:\.[a-zA-Z0-9](?:[a-zA-Z0-9-]{0,61}[a-zA-Z0-9])?)*$'
          example: supplier@techcorp.com
        phoneNumber:
          type: string
          description: Supplier phone in E.164 format.
          pattern: '^\+?[1-9]\d{7,14}$'
          example: "+14155552671"
        website:
          type: string
          description: Supplier website URL (optional).
          pattern: '^https?://[a-zA-Z0-9]([a-zA-Z0-9\-]{0,61}[a-zA-Z0-9])?(\.[a-zA-Z0-9]([a-zA-Z0-9\-]{0,61}[a-zA-Z0-9])?)*(/[^\s]*)?$'
          example: https://www.techcorp.com
        isActive:
          type: boolean
          description: Defaults to true if omitted.
          default: true
          example: true
        tags:
          type: array
          description: Optional tags. Max 10 unique items, each 1–20 chars.
          maxItems: 10
          uniqueItems: true
          items:
            type: string
            minLength: 1
            maxLength: 20
          example:
            - wireless
            - bluetooth
            - noise-cancelling

    PaginatedProducts:
      type: object
      description: Paginated wrapper returned by GET /products.
      required:
        - items
        - totalCount
        - page
        - pageSize
      properties:
        items:
          type: array
          description: Products for the current page.
          items:
            $ref: '#/components/schemas/Product'
        totalCount:
          type: integer
          description: Total matching products across all pages.
          minimum: 0
          example: 142
        page:
          type: integer
          description: Current page number (1-based).
          minimum: 1
          example: 1
        pageSize:
          type: integer
          description: Items per page.
          minimum: 1
          maximum: 100
          example: 20
      additionalProperties: false

  responses:
    Unauthorized:
      description: Unauthorized — missing, expired, or invalid credentials.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            timestamp: "2026-07-06T12:34:56.789Z"
            status: 401
            error: Unauthorized
            message: Authentication token is missing or has expired.
            path: /products/v1/products
            errors: []

    Forbidden:
      description: Forbidden — authenticated but lacks required permissions.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            timestamp: "2026-07-06T12:34:56.789Z"
            status: 403
            error: Forbidden
            message: Insufficient permissions to access this resource.
            path: /products/v1/products
            errors: []

    NotFound:
      description: Not Found — the resource does not exist.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            timestamp: "2026-07-06T12:34:56.789Z"
            status: 404
            error: Not Found
            message: The requested resource does not exist.
            path: /products/v1/products
            errors: []

    UnsupportedMediaType:
      description: Unsupported Media Type — must use application/json.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            timestamp: "2026-07-06T12:34:56.789Z"
            status: 415
            error: Unsupported Media Type
            message: Content-Type must be application/json.
            path: /products/v1/products
            errors: []

    TooManyRequests:
      description: Too Many Requests — rate limit exceeded.
      headers:
        Retry-After:
          schema:
            type: integer
          description: Seconds to wait before retrying.
          example: 30
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            timestamp: "2026-07-06T12:34:56.789Z"
            status: 429
            error: Too Many Requests
            message: Rate limit exceeded. Retry after 30 seconds.
            path: /products/v1/products
            errors: []

    InternalServerError:
      description: Internal Server Error — unexpected server-side failure.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            timestamp: "2026-07-06T12:34:56.789Z"
            status: 500
            error: Internal Server Error
            message: An unexpected error occurred. Please try again later.
            path: /products/v1/products
            errors: []

    ServiceUnavailable:
      description: Service Unavailable — backend is temporarily down.
      headers:
        Retry-After:
          schema:
            type: integer
          description: Estimated seconds until recovery.
          example: 60
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            timestamp: "2026-07-06T12:34:56.789Z"
            status: 503
            error: Service Unavailable
            message: The service is temporarily unavailable. Retry after 60 seconds.
            path: /products/v1/products
            errors: []

paths:
  /products:
    get:
      summary: List Products
      description: |
        Returns a paginated list of products. Supports filtering by category,
        free-text search, and sorting. Results are wrapped in a PaginatedProducts envelope.
      operationId: listProducts
      security:
        - oauth_2_0:
            - products:read
        - basic_auth: []
      parameters:
        - name: page
          in: query
          description: 1-based page index. Defaults to 1.
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
            example: 1
        - name: pageSize
          in: query
          description: Number of items per page. Between 1 and 100. Defaults to 20.
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
            example: 20
        - name: category
          in: query
          description: Filter by product category.
          required: false
          schema:
            type: string
            enum:
              - Electronics
              - Clothing
              - "Home & Garden"
              - "Sports & Outdoors"
              - Books
              - "Toys & Games"
              - "Health & Beauty"
              - Automotive
              - "Food & Beverages"
              - "Office Supplies"
            example: Electronics
        - name: search
          in: query
          description: Free-text keyword search (1–50 characters).
          required: false
          schema:
            type: string
            minLength: 1
            maxLength: 50
            example: bluetooth
        - name: sortBy
          in: query
          description: Field to sort results by.
          required: false
          schema:
            type: string
            enum: [name, price, createdDate]
            example: price
      responses:
        '200':
          description: Paginated list of products successfully retrieved.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedProducts'
              example:
                totalCount: 142
                page: 1
                pageSize: 2
                items:
                  - id: a1b2c3d4-e5f6-7890-abcd-ef1234567890
                    name: Wireless Bluetooth Headphones
                    description: Premium over-ear noise-cancelling headphones with 30-hour battery life.
                    sku: WBH-XL900-BLK
                    price: 149.99
                    currency: USD
                    category: Electronics
                    stockQuantity: 250
                    email: supplier@techcorp.com
                    phoneNumber: "+14155552671"
                    website: https://www.techcorp.com
                    isActive: true
                    tags: [wireless, bluetooth, noise-cancelling]
                    createdDate: "2026-06-01T08:30:00.000Z"
                  - id: b2c3d4e5-f6a7-8901-bcde-f12345678901
                    name: Ergonomic Office Chair
                    description: Fully adjustable lumbar-support chair with breathable mesh back.
                    sku: EOC-MESH-GRY
                    price: 379.00
                    currency: USD
                    category: Office Supplies
                    stockQuantity: 45
                    email: sales@ergofurniture.com
                    phoneNumber: "+442071234567"
                    website: https://www.ergofurniture.com
                    isActive: true
                    tags: [ergonomic, office]
                    createdDate: "2026-06-20T09:00:00.000Z"
        '400':
          description: Bad Request — invalid query parameter values.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                timestamp: "2026-07-06T12:34:56.789Z"
                status: 400
                error: Bad Request
                message: "Invalid query parameter 'pageSize': value 500 exceeds maximum of 100."
                path: /products/v1/products
                errors: []
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '415':
          $ref: '#/components/responses/UnsupportedMediaType'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'

    post:
      summary: Create Product
      description: |
        Creates a new product in the catalog. All required fields must be present
        and pass strict validation. Additional properties are rejected.
        Returns the created product with server-generated id and createdDate (HTTP 201).
      operationId: createProduct
      security:
        - oauth_2_0:
            - products:write
        - basic_auth: []
      requestBody:
        required: true
        description: Product creation payload conforming to the ProductInput schema.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductInput'
            example:
              name: Wireless Bluetooth Headphones
              description: Premium over-ear noise-cancelling headphones with 30-hour battery life.
              sku: WBH-XL900-BLK
              price: 149.99
              currency: USD
              category: Electronics
              stockQuantity: 250
              email: supplier@techcorp.com
              phoneNumber: "+14155552671"
              website: https://www.techcorp.com
              isActive: true
              tags: [wireless, bluetooth, noise-cancelling]
      responses:
        '201':
          description: Product created. Returns the full Product resource including id and createdDate.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
              example:
                id: a1b2c3d4-e5f6-7890-abcd-ef1234567890
                name: Wireless Bluetooth Headphones
                description: Premium over-ear noise-cancelling headphones with 30-hour battery life.
                sku: WBH-XL900-BLK
                price: 149.99
                currency: USD
                category: Electronics
                stockQuantity: 250
                email: supplier@techcorp.com
                phoneNumber: "+14155552671"
                website: https://www.techcorp.com
                isActive: true
                tags: [wireless, bluetooth, noise-cancelling]
                createdDate: "2026-07-06T12:35:10.123Z"
        '400':
          description: Bad Request — malformed JSON or syntactically invalid body.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                timestamp: "2026-07-06T12:34:56.789Z"
                status: 400
                error: Bad Request
                message: "Failed to parse request body: unexpected token '}' at position 142."
                path: /products/v1/products
                errors: []
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Conflict — a product with this SKU already exists.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                timestamp: "2026-07-06T12:34:56.789Z"
                status: 409
                error: Conflict
                message: A product with SKU 'WBH-XL900-BLK' already exists.
                path: /products/v1/products
                errors:
                  - field: sku
                    message: duplicate value — SKU must be unique across all products
        '415':
          $ref: '#/components/responses/UnsupportedMediaType'
        '422':
          description: |
            Unprocessable Entity — field-level validation failures.
            The errors array lists every failing field.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                timestamp: "2026-07-06T12:34:56.789Z"
                status: 422
                error: Unprocessable Entity
                message: Request body contains 5 validation error(s).
                path: /products/v1/products
                errors:
                  - field: name
                    message: length must be between 3 and 100 characters
                  - field: sku
                    message: does not match required pattern ^[A-Z0-9\-]{6,20}$
                  - field: price
                    message: must be greater than or equal to 0.01
                  - field: email
                    message: is not a valid RFC 5322 email address
                  - field: tags[3]
                    message: exceeds maximum length of 20 characters
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'

  /products/{name}:
    get:
      summary: Get Product by Name
      description: |
        Returns the full details of a single product identified by its exact display name.
        The lookup is case-insensitive. URL-encode special characters in the path
        (e.g., spaces as %20).
      operationId: getProductByName
      security:
        - oauth_2_0:
            - products:read
        - basic_auth: []
      parameters:
        - name: name
          in: path
          required: true
          description: |
            The exact display name of the product (URL-encoded).
            Must be 3–100 characters after decoding.
          schema:
            type: string
            minLength: 3
            maxLength: 100
            example: Wireless%20Bluetooth%20Headphones
      responses:
        '200':
          description: Product found. Returns the complete Product resource.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
              example:
                id: a1b2c3d4-e5f6-7890-abcd-ef1234567890
                name: Wireless Bluetooth Headphones
                description: Premium over-ear noise-cancelling headphones with 30-hour battery life.
                sku: WBH-XL900-BLK
                price: 149.99
                currency: USD
                category: Electronics
                stockQuantity: 250
                email: supplier@techcorp.com
                phoneNumber: "+14155552671"
                website: https://www.techcorp.com
                isActive: true
                tags: [wireless, bluetooth, noise-cancelling]
                createdDate: "2026-06-01T08:30:00.000Z"
        '400':
          description: Bad Request — name parameter is invalid (too short or too long).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                timestamp: "2026-07-06T12:34:56.789Z"
                status: 400
                error: Bad Request
                message: URI parameter 'name' must be between 3 and 100 characters.
                path: /products/v1/products/AB
                errors: []
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: Not Found — no product with the specified name exists.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                timestamp: "2026-07-06T12:34:56.789Z"
                status: 404
                error: Not Found
                message: No product found with name 'Quantum Flux Capacitor'.
                path: /products/v1/products/Quantum%20Flux%20Capacitor
                errors: []
        '415':
          $ref: '#/components/responses/UnsupportedMediaType'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
